---
# =============================================================================
# Phase 1 (Talos) – Prepare talosctl
# =============================================================================
- name: "Prepare Talos"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure local workdir exists
      ansible.builtin.file:
        path: "{{ local_workdir }}/talos"
        state: directory
        mode: '0755'

    - name: Check if talosctl is already installed
      ansible.builtin.stat:
        path: "{{ local_bin_dir }}/talosctl"
      register: talosctl_bin

    - name: Download talosctl
      ansible.builtin.get_url:
        url: "https://github.com/siderolabs/talos/releases/download/{{ talos_version }}/talosctl-linux-amd64"
        dest: "{{ local_bin_dir }}/talosctl"
        mode: '0755'
      when: not talosctl_bin.stat.exists

    - name: Check if kubectl is already installed
      ansible.builtin.stat:
        path: "{{ local_bin_dir }}/kubectl"
      register: kubectl_bin

    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: "{{ local_bin_dir }}/kubectl"
        mode: '0755'
      when: not kubectl_bin.stat.exists
