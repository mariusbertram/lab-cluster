---
# =============================================================================
# Phase 0 – Provision KVM Infrastructure with Terraform
# =============================================================================
- name: "Provision Infrastructure"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure terraform directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../terraform"
      register: tf_dir_stat

    - name: Fail if terraform directory is missing
      ansible.builtin.fail:
        msg: "Terraform directory not found at {{ playbook_dir }}/../terraform"
      when: not tf_dir_stat.stat.exists

    - name: Generate terraform.tfvars.json from Ansible variables
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../terraform/terraform.tfvars.json"
        content: |
          {
            "libvirt_uri": "{{ libvirt_uri }}",
            "cluster_name": "{{ cluster_name }}",
            "cluster_domain": "{{ base_domain }}",
            "network_name": "{{ network_name }}",
            "network_address": "{{ cluster_network_gateway }}",
            "network_prefix": 24,
            "network_ipv6_address": "{{ cluster_ipv6_gateway }}",
            "network_ipv6_prefix": 64,
            "api_vip": "{{ api_vip }}",
            "api_vip_ipv6": "{{ api_vip_ipv6 }}",
            "ingress_vip": "{{ ingress_vip }}",
            "ingress_vip_ipv6": "{{ ingress_vip_ipv6 }}",
            "storage_pool_path": "{{ storage_pool_path }}",
            "agent_iso_path": "{{ agent_iso_path }}",
            "masters": {{ ([nodes.masters[0]] if cluster_flavor == 'sno' else nodes.masters) | to_json }},
            "workers": {{ ([] if cluster_flavor == 'compact' else nodes.workers) | to_json }}
          }
        mode: '0644'

    - name: Terraform Init
      ansible.builtin.command:
        cmd: terraform init
        chdir: "{{ playbook_dir }}/../terraform"
      register: tf_init
      changed_when: "'Terraform has been successfully initialized' in tf_init.stdout"

    - name: Terraform Apply
      ansible.builtin.command:
        cmd: terraform apply -auto-approve
        chdir: "{{ playbook_dir }}/../terraform"
      register: tf_apply
      changed_when: "'Apply complete!' in tf_apply.stdout"

    - name: Refresh Inventory
      ansible.builtin.meta: refresh_inventory
