---
# =============================================================================
# Phase 5 – Day-2 configuration of the OpenShift cluster
# =============================================================================
- name: "Day-2 Configuration"
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: "{{ local_workdir }}/cluster-config/auth/kubeconfig"
    PATH: "{{ local_bin_dir }}:{{ ansible_env.PATH }}"
  roles:
    - role: day2_config

