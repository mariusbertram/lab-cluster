---
# =============================================================================
# Phase 2 – Generate install-config.yaml, agent-config.yaml and build ISO (Local)
# =============================================================================
- name: "Generate Agent ISO locally"
  hosts: localhost
  connection: local
  tasks:
    - name: Clean up old local working directory
      ansible.builtin.file:
        path: "{{ local_workdir }}/cluster-config"
        state: absent

    - name: Create local cluster config directory
      ansible.builtin.file:
        path: "{{ local_workdir }}/cluster-config"
        state: directory
        mode: "0755"

    - name: Generate install-config.yaml from template
      ansible.builtin.template:
        src: "../templates/install-config.yaml.j2"
        dest: "{{ local_workdir }}/cluster-config/install-config.yaml"
        mode: "0644"

    - name: Generate agent-config.yaml from template
      ansible.builtin.template:
        src: "../templates/agent-config.yaml.j2"
        dest: "{{ local_workdir }}/cluster-config/agent-config.yaml"
        mode: "0644"

    - name: Generate agent ISO locally
      ansible.builtin.command:
        cmd: "{{ local_bin_dir }}/openshift-install agent create image --dir {{ local_workdir }}/cluster-config"
      environment:
        PATH: "{{ local_bin_dir }}:{{ ansible_env.PATH }}"
      register: iso_result
      changed_when: iso_result.rc == 0

- name: "Copy ISO to KVM host (Per-Node Copy to avoid SELinux conflicts)"
  hosts: bastion
  become: true
  tasks:
    - name: Ensure target directory exists on KVM host
      ansible.builtin.file:
        path: "{{ storage_pool_path }}"
        state: directory
        mode: "0755"

    - name: Copy ISO for each master node
      ansible.builtin.copy:
        src: "{{ local_workdir }}/cluster-config/agent.x86_64.iso"
        dest: "{{ storage_pool_path }}/agent-{{ item.name }}.iso"
        mode: "0644"
      loop: "{{ nodes.masters }}"

    - name: Copy ISO for each worker node
      ansible.builtin.copy:
        src: "{{ local_workdir }}/cluster-config/agent.x86_64.iso"
        dest: "{{ storage_pool_path }}/agent-{{ item.name }}.iso"
        mode: "0644"
      loop: "{{ nodes.workers }}"
