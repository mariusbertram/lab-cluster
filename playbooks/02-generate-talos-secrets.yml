---
# =============================================================================
# Phase 2 (Talos) – Generate Cluster Secrets
# =============================================================================
- name: "Generate Talos Secrets"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check if secrets.yaml already exists
      ansible.builtin.stat:
        path: "{{ local_workdir }}/talos/secrets.yaml"
      register: secrets_file

    - name: Generate Talos secrets
      ansible.builtin.command:
        cmd: "{{ local_bin_dir }}/talosctl gen secrets -o {{ local_workdir }}/talos/secrets.yaml"
      when: not secrets_file.stat.exists
      changed_when: true
