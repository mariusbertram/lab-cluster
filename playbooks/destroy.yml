---
# =============================================================================
# LAP-Cluster – Full Cleanup Playbook
# Reverses all configuration steps (Infrastructure, UniFi, Local Artifacts)
# =============================================================================
- name: "LAP-Cluster – Prepare Destruction"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "Refresh Inventory to ensure nodes are known"
      ansible.builtin.meta: refresh_inventory

- name: "LAP-Cluster – UniFi Cleanup"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "UniFi Cleanup (DNS & Clients)"
      block:
        - name: Get site information
          ubiquiti.unifi_api.network:
            method: GET
            path: "/v1/sites"
          register: unifi_sites

        - name: Find site ID
          ansible.builtin.set_fact:
            unifi_site_id: >-
              {{
                (
                  unifi_sites.data.data 
                  | selectattr('name', 'defined') 
                  | selectattr('name', 'match', unifi_site_name, ignorecase=true) | first 
                ).id
              }}

        # --- DNS Cleanup ---
        - name: Get all DNS policies
          ubiquiti.unifi_api.network:
            method: GET
            path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
          register: current_dns

        - name: Delete DNS records matching our cluster domain
          ubiquiti.unifi_api.network:
            method: DELETE
            path: "/v1/sites/{{ unifi_site_id }}/dns/policies/{{ item.id }}"
          loop: "{{ current_dns.data.data }}"
          when: 
            - item.domain is defined
            - item.domain is search(cluster_name ~ "." ~ base_domain)
          loop_control:
            label: "{{ item.domain }}"

        # --- Client Cleanup (Legacy stamgr via URI - As per Rule 2) ---
        - name: Forget clients in UniFi
          ansible.builtin.uri:
            url: "{{ unifi_base_url }}/proxy/network/api/s/{{ unifi_site_name | lower }}/cmd/stamgr"
            method: POST
            headers:
              X-API-Key: "{{ unifi_token }}"
              Authorization: "Bearer {{ unifi_token }}"
            validate_certs: "{{ unifi_verify_ssl }}"
            body_format: json
            body:
              macs: "{{ (nodes.masters | map(attribute='mac') | list + nodes.workers | map(attribute='mac') | list) | map('lower') | list }}"
              cmd: "forget-sta"
            status_code: [200]
          ignore_errors: true

      module_defaults:
        ubiquiti.unifi_api.network:
          base_url: "{{ unifi_base_url }}"
          token: "{{ unifi_token }}"
          validate_certs: "{{ unifi_verify_ssl }}"
      tags: unifi_cleanup

- name: "LAP-Cluster – Pre-Terraform ISO Cleanup"
  hosts: bastion
  become: true
  gather_facts: false
  tasks:
    - name: Remove per-node ISOs on KVM host (Required before Terraform deletes the pool)
      ansible.builtin.file:
        path: "{{ storage_pool_path }}/agent-{{ item.name }}.iso"
        state: absent
      loop: "{{ nodes.masters + nodes.workers }}"
      loop_control:
        label: "agent-{{ item.name }}.iso"
  tags: terraform_cleanup

- name: "LAP-Cluster – Terraform Destroy"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Terraform Destroy
      ansible.builtin.command:
        cmd: terraform destroy -auto-approve
        chdir: "{{ playbook_dir }}/../terraform"
      register: tf_destroy
      changed_when: "'Destroy complete!' in tf_destroy.stdout"
  tags: terraform_cleanup

- name: "LAP-Cluster – Local Artifact Cleanup"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Remove local cluster config directory
      ansible.builtin.file:
        path: "{{ local_workdir }}/cluster-config"
        state: absent

    - name: Remove Terraform vars file
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../terraform/terraform.tfvars.json"
        state: absent
  tags: local_cleanup
