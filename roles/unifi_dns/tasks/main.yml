---
# =============================================================================
# unifi_dns – Manage DNS records on UniFi Controller with Idempotency
# =============================================================================

- name: Manage DNS records
  block:
    - name: Get site information
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites"
      register: unifi_sites

    - name: Find site ID
      ansible.builtin.set_fact:
        unifi_site_id: >-
          {{
            (
              unifi_sites.data.data 
              | selectattr('name', 'defined') 
              | selectattr('name', 'match', unifi_site_name, ignorecase=true) | first 
            ).id
          }}

    # --- Master Nodes ---
    - name: Check existing A records for master nodes
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('{{ item.hostname }}.{{ cluster_name }}.{{ base_domain }}'),type.eq('A_RECORD'))"
      loop: "{{ master_nodes }}"
      register: master_a_checks

    - name: Create A records for master nodes if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "A_RECORD"
          enabled: true
          domain: "{{ item.item.hostname }}.{{ cluster_name }}.{{ base_domain }}"
          ipv4Address: "{{ item.item.ip }}"
          ttlSeconds: 3600
      loop: "{{ master_a_checks.results }}"
      when: item.data.totalCount == 0
      loop_control:
        label: "{{ item.item.hostname }}"

    - name: Check existing AAAA records for master nodes
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('{{ item.hostname }}.{{ cluster_name }}.{{ base_domain }}'),type.eq('AAAA_RECORD'))"
      loop: "{{ master_nodes }}"
      register: master_aaaa_checks

    - name: Create AAAA records for master nodes if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "AAAA_RECORD"
          enabled: true
          domain: "{{ item.item.hostname }}.{{ cluster_name }}.{{ base_domain }}"
          ipv6Address: "{{ item.item.ipv6 }}"
          ttlSeconds: 3600
      loop: "{{ master_aaaa_checks.results }}"
      when: item.data.totalCount == 0
      loop_control:
        label: "{{ item.item.hostname }}"

    # --- Worker Nodes ---
    - name: Check existing A records for worker nodes
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('{{ item.hostname }}.{{ cluster_name }}.{{ base_domain }}'),type.eq('A_RECORD'))"
      loop: "{{ worker_nodes }}"
      register: worker_a_checks

    - name: Create A records for worker nodes if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "A_RECORD"
          enabled: true
          domain: "{{ item.item.hostname }}.{{ cluster_name }}.{{ base_domain }}"
          ipv4Address: "{{ item.item.ip }}"
          ttlSeconds: 3600
      loop: "{{ worker_a_checks.results }}"
      when: item.data.totalCount == 0
      loop_control:
        label: "{{ item.item.hostname }}"

    - name: Check existing AAAA records for worker nodes
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('{{ item.hostname }}.{{ cluster_name }}.{{ base_domain }}'),type.eq('AAAA_RECORD'))"
      loop: "{{ worker_nodes }}"
      register: worker_aaaa_checks

    - name: Create AAAA records for worker nodes if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "AAAA_RECORD"
          enabled: true
          domain: "{{ item.item.hostname }}.{{ cluster_name }}.{{ base_domain }}"
          ipv6Address: "{{ item.item.ipv6 }}"
          ttlSeconds: 3600
      loop: "{{ worker_aaaa_checks.results }}"
      when: item.data.totalCount == 0
      loop_control:
        label: "{{ item.item.hostname }}"

    # --- API VIP ---
    - name: Check existing API VIP A record
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('api.{{ cluster_name }}.{{ base_domain }}'),type.eq('A_RECORD'))"
      register: api_a_check

    - name: Create API VIP A record if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "A_RECORD"
          enabled: true
          domain: "api.{{ cluster_name }}.{{ base_domain }}"
          ipv4Address: "{{ api_vip }}"
          ttlSeconds: 3600
      when: api_a_check.data.totalCount == 0

    - name: Check existing API VIP AAAA record
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('api.{{ cluster_name }}.{{ base_domain }}'),type.eq('AAAA_RECORD'))"
      register: api_aaaa_check

    - name: Create API VIP AAAA record if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "AAAA_RECORD"
          enabled: true
          domain: "api.{{ cluster_name }}.{{ base_domain }}"
          ipv6Address: "{{ api_vip_ipv6 }}"
          ttlSeconds: 3600
      when: api_aaaa_check.data.totalCount == 0

    # --- Ingress Wildcard ---
    - name: Check existing Ingress wildcard A record
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('*.apps.{{ cluster_name }}.{{ base_domain }}'),type.eq('A_RECORD'))"
      register: apps_a_check

    - name: Create Ingress wildcard A record if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "A_RECORD"
          enabled: true
          domain: "*.apps.{{ cluster_name }}.{{ base_domain }}"
          ipv4Address: "{{ ingress_vip }}"
          ttlSeconds: 3600
      when: apps_a_check.data.totalCount == 0

    - name: Check existing Ingress wildcard AAAA record
      ubiquiti.unifi_api.network:
        method: GET
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        query:
          filter: "and(domain.eq('*.apps.{{ cluster_name }}.{{ base_domain }}'),type.eq('AAAA_RECORD'))"
      register: apps_aaaa_check

    - name: Create Ingress wildcard AAAA record if missing
      ubiquiti.unifi_api.network:
        method: POST
        path: "/v1/sites/{{ unifi_site_id }}/dns/policies"
        body:
          type: "AAAA_RECORD"
          enabled: true
          domain: "*.apps.{{ cluster_name }}.{{ base_domain }}"
          ipv6Address: "{{ ingress_vip_ipv6 }}"
          ttlSeconds: 3600
      when: apps_aaaa_check.data.totalCount == 0

  module_defaults:
    ubiquiti.unifi_api.network:
      base_url: "{{ unifi_base_url }}"
      token: "{{ unifi_token }}"
      validate_certs: "{{ unifi_verify_ssl }}"
