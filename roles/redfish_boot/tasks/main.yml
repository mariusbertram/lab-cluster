---
# =============================================================================
# redfish_boot – Power-On/Reset and Virtual Media via Redfish
# =============================================================================

- name: "{{ node_name }} – Set system URI"
  ansible.builtin.set_fact:
    node_system_uri: "/redfish/v1/Systems/{{ node_redfish_system_id }}"

- name: "{{ node_name }} – Set one-time boot to CD-ROM"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}"
    method: PATCH
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      Boot:
        BootSourceOverrideTarget: "Cd"
        BootSourceOverrideEnabled: "Once"
    status_code: [200, 204, 400, 500] 
  ignore_errors: true
  when: not (eject_iso | default(false) | bool)

- name: "{{ node_name }} – Insert Virtual Media (ISO)"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/VirtualMedia/Cd/Actions/VirtualMedia.InsertMedia"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      Image: "{{ boot_iso_url }}"
    status_code: [200, 204]
  when: 
    - not (eject_iso | default(false) | bool)
    - boot_iso_url is defined and boot_iso_url != ""

- name: "{{ node_name }} – Retrieve current power state"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}"
    method: GET
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
  register: node_status
  when: not (eject_iso | default(false) | bool)

- name: "{{ node_name }} – Power on/Reset via Redfish"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      ResetType: "{{ (node_status.json.PowerState == 'Off') | ternary('On', 'ForceRestart') }}"
    status_code: [200, 204]
  when: 
    - not (eject_iso | default(false) | bool)
    - node_status is not skipped

- name: "{{ node_name }} – Successfully triggered boot"
  ansible.builtin.debug:
    msg: "{{ node_name }} is booting from {{ boot_iso_url }}."
  when: not (eject_iso | default(false) | bool)

- name: "{{ node_name }} – Eject Virtual Media (ISO)"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/VirtualMedia/Cd/Actions/VirtualMedia.EjectMedia"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 204]
  when: eject_iso | default(false) | bool
