---
# =============================================================================
# redfish_boot – Boots a VM via the Sushy-Tools Redfish API
#
# Required variables:
#   - node_name:              Hostname of the VM
#   - node_bmc_address:       Host:Port of the Sushy-Tools endpoint
#   - node_redfish_system_id: Libvirt domain name / System ID in Sushy
# =============================================================================

- name: "{{ node_name }} – Discover system UUID via Redfish"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}/redfish/v1/Systems"
    method: GET
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: redfish_systems_list

- name: "{{ node_name }} – Extract system URI"
  ansible.builtin.set_fact:
    node_system_uri: >-
      {{
        redfish_systems_list.json['Members']
        | map(attribute='@odata.id')
        | select('search', node_redfish_system_id)
        | first
      }}

- name: "{{ node_name }} – Retrieve system details"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}"
    method: GET
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: node_system_info

- name: "{{ node_name }} – Current power state"
  ansible.builtin.debug:
    msg: "Power State: {{ node_system_info.json.PowerState }}"

# --- Virtual Media: Insert agent ISO ---
- name: "{{ node_name }} – Insert virtual media ISO"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/VirtualMedia/Cd/Actions/VirtualMedia.InsertMedia"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      Image: "file://{{ agent_iso_output }}"
      Inserted: true
      WriteProtected: true
    status_code: [200, 204]
  ignore_errors: true

# --- Set boot override to CD-ROM ---
- name: "{{ node_name }} – Set boot source to VirtualMedia (CD)"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}"
    method: PATCH
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      Boot:
        BootSourceOverrideTarget: "{{ redfish_boot_source_override }}"
        BootSourceOverrideEnabled: Once
    status_code: [200, 204]

# --- Power off node (if still on) ---
- name: "{{ node_name }} – Graceful shutdown (if powered on)"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      ResetType: ForceOff
    status_code: [200, 204]
  when: node_system_info.json.PowerState == "On"

- name: "{{ node_name }} – Wait after shutdown"
  ansible.builtin.pause:
    seconds: "{{ boot_wait_seconds }}"
  when: node_system_info.json.PowerState == "On"

# --- Power on node ---
- name: "{{ node_name }} – Power on via Redfish"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      ResetType: "On"
    status_code: [200, 204]

- name: "{{ node_name }} – Successfully booted"
  ansible.builtin.debug:
    msg: "{{ node_name }} has been booted from the agent ISO via Redfish/Sushy-Tools."
