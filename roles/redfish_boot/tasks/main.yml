---
# =============================================================================
# redfish_boot – Boots a VM via the Sushy-Tools Redfish API
#
# Simplified version: ISO is already attached via Terraform.
# Just ensures the node is powered on.
# =============================================================================

- name: "{{ node_name }} – Set system URI from UUID"
  ansible.builtin.set_fact:
    node_system_uri: "/redfish/v1/Systems/{{ node_redfish_system_id }}"

- name: "{{ node_name }} – Retrieve system details"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}"
    method: GET
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: node_system_info

- name: "{{ node_name }} – Current power state"
  ansible.builtin.debug:
    msg: "Power State: {{ node_system_info.json.PowerState }}"

# --- Power on node if it's off ---
- name: "{{ node_name }} – Power on via Redfish"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      ResetType: "On"
    status_code: [200, 204]
  when: node_system_info.json.PowerState == "Off"

# --- Reset node if it's already on (to ensure it boots from the fresh ISO) ---
- name: "{{ node_name }} – Force Reset via Redfish"
  ansible.builtin.uri:
    url: "{{ sushy_protocol }}://{{ node_bmc_address }}{{ node_system_uri }}/Actions/ComputerSystem.Reset"
    method: POST
    user: "{{ redfish_username }}"
    password: "{{ redfish_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      ResetType: "ForceRestart"
    status_code: [200, 204]
  when: node_system_info.json.PowerState == "On"

- name: "{{ node_name }} – Successfully triggered boot"
  ansible.builtin.debug:
    msg: "{{ node_name }} is booting from the attached agent ISO."
